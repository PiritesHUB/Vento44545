<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Youssef The God | Official Site</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0d0e12;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            background: #161920;
            padding: 40px;
            border-radius: 16px;
            border: 1px solid #232836;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #ff4655, #ff8038);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        p {
            color: #94a3b8;
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 10px; /* Reduced since button is gone */
        }

        .badge {
            display: inline-block;
            background: #232836;
            color: #ff4655;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 70, 85, 0.2);
        }

        footer {
            margin-top: 40px;
            font-size: 0.85rem;
            color: #475569;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="badge">Live Soon</div>
        <h1>Youssef The God</h1>
        <p>Welcome to my official corner of the internet. This space is currently under construction while I build out something epic. Stay tuned.</p>
    </div>

    <footer>
        &copy; 2026 Youssef The God. All rights reserved.
    </footer>

</body>
</html>
